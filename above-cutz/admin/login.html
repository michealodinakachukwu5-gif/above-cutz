<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login — Above Cutz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">

<div class="login-card">
  <p class="eyebrow">Above Cutz</p>
  <h1 class="login-title">Staff Login</h1>
  <form id="login-form">
    <label class="field">
      <span>Email</span>
      <input type="email" id="login-email" required autocomplete="username">
    </label>
    <label class="field">
      <span>Password</span>
      <input type="password" id="login-password" required autocomplete="current-password">
    </label>
    <button type="submit" class="btn btn-primary btn-block" id="login-submit">Log In</button>
    <p id="login-status" class="login-status" role="status"></p>
  </form>
  <a href="../index.html" class="back-link">&larr; Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="js/admin-auth.js"></script>
</body>
</html>
